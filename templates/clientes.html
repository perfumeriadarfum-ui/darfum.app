{% extends "base.html" %}

{% block contenido %}

<h2>👤 Clientes</h2>

<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Celular</th>
            <th>Cédula</th>
        </tr>
    </thead>
    <tbody>
        {% for c in clientes %}
        <tr>
            <td>{{ c[0] }}</td>
            <td>{{ c[1] or '' }}</td>
            <td>{{ c[2] or '' }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
