{% extends "base.html" %}

{% block contenido %}

<div class="contenedor-editar">

    <h2>Editar Producto</h2>

<form method="POST" enctype="multipart/form-data">

<label>Referencia</label>
<input type="text" name="referencia" value="{{ p[1] }}">

<label>Nombre</label>
<input type="text" name="nombre" value="{{ p[2] }}">

<label>Precio compra</label>
<input type="number" id="compra">

<label>Ganancia (%)</label>
<input type="number" id="ganancia" value="30">

<input type="text" id="venta" readonly>
<input type="hidden" name="venta" id="venta_real">

<label>Stock</label>
<input type="number" name="stock" value="{{ p[4] }}">

<label>Imagen</label>
<input type="file" name="imagen">

<label>Categoría</label>
<select name="categoria">
    <option value="original" {% if p[5]=='original' %}selected{% endif %}>Original</option>
    <option value="replica" {% if p[5]=='replica' %}selected{% endif %}>Replica</option>
    <option value="accesorio" {% if p[5]=='accesorio' %}selected{% endif %}>Accesorio</option>
</select>

<label>Género</label>
<select name="genero">
    <option value="hombre" {% if p[6]=='hombre' %}selected{% endif %}>Hombre</option>
    <option value="mujer" {% if p[6]=='mujer' %}selected{% endif %}>Mujer</option>
</select>

<button type="submit" class="btn-guardar">
    💾 Guardar cambios
</button>

</form>

</div>

<script>
const compra = document.getElementById("compra");
const ganancia = document.getElementById("ganancia");
const venta = document.getElementById("venta");
const ventaReal = document.getElementById("venta_real");

function calcular() {
    let c = parseFloat(compra.value) || 0;
    let g = parseFloat(ganancia.value) || 0;

    let v = c + (c * g / 100);

    // 🔥 REDONDEO A MILES HACIA ARRIBA
    let redondeado = Math.ceil(v / 1000) * 1000;

    venta.value = redondeado.toLocaleString("es-CO");
    ventaReal.value = redondeado;
}

compra.addEventListener("input", calcular);
ganancia.addEventListener("input", calcular);
</script>

{% endblock %}
